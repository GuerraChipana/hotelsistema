# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=${PORT:8080}

# ==========================================
# SPRING APPLICATION CONFIGURATION
# ==========================================
spring.application.name=hotel-sistema-backend

# ==========================================
# DATASOURCE CONFIGURATION
# ==========================================
# En Railway: usa las variables que te da el plugin de MySQL (MYSQLHOST, MYSQLPORT, etc.)
# o arma la URL completa en DB_URL. En local, cae al valor por defecto.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_sistema?useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ferguch2104}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
# IMPORTANTE: las tablas ya existen (las creaste con el script SQL).
# "validate" solo verifica que las entidades coincidan con la BD, nunca modifica nada.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT CONFIGURATION
# ==========================================
# Minimo 32 caracteres (256 bits) para HS256. Cambialo en produccion via variable de entorno.
jwt.secret=${JWT_SECRET:este-es-un-secreto-de-desarrollo-cambialo-en-produccion-1234}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.org.springframework.security=INFO
logging.level.com.hotelsistema.backend=DEBUG