server:
  port: ${PORT:8080}

spring:
  application:
    name: hotel-sistema-backend

  datasource:
     # En Railway: usa las variables que te da el plugin de MySQL (MYSQLHOST, MYSQLPORT, etc.)
    # o arma la URL completa en DB_URL. En local, cae al valor por defecto.
    url: ${DB_URL:jdbc:mysql://localhost:3306/hotel_sistema?useSSL=false&serverTimezone=America/Lima}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Ferguch2104}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # IMPORTANTE: las tablas ya existen (las creaste con el script SQL).
    # "validate" solo verifica que las entidades coincidan con la BD, nunca modifica nada.
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  # Minimo 32 caracteres (256 bits) para HS256. Cambialo en produccion via variable de entorno.
  secret: ${JWT_SECRET:este-es-un-secreto-de-desarrollo-cambialo-en-produccion-1234}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 horas

logging:
  level:
    org.springframework.security: INFO
    com.hotelsistema.backend: DEBUG
